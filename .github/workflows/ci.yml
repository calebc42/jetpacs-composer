name: CI

on:
  push:
    # This file rides the slop-fork line; its branches live under slop-fork/.
    branches: ["slop-fork/**"]
  pull_request:

jobs:
  elisp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Emacs
        run: sudo apt-get update && sudo apt-get install -y emacs-nox
      # The data-view suites (records, tables, the byte-for-byte goldens)
      # read through the vulpea index; without vulpea they degrade to the
      # "needs vulpea" placeholder and skip.  Provision the engine so the
      # full suite runs: its ELPA deps (emacsql, s, dash, org-ql, and their
      # transitive packages) from MELPA via install-test-deps.sh, and vulpea
      # itself from a pinned upstream checkout named by VULPEA_DIR — the same
      # revision the suite is validated against locally.
      - name: Provision the vulpea engine
        run: |
          git clone https://github.com/d12frosted/vulpea.git "$RUNNER_TEMP/vulpea"
          git -C "$RUNNER_TEMP/vulpea" checkout 3e17ecea9b28b39f85edbd9c27e7b4cce16f26a3
          sh elisp/test/install-test-deps.sh
      - name: Run the runtime suite + bundle smoke
        env:
          VULPEA_DIR: ${{ runner.temp }}/vulpea
        run: sh elisp/test/run-tests.sh

  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Emacs (for the exporter cross-check)
        run: sudo apt-get update && sudo apt-get install -y emacs-nox
      - name: Build the elisp reference bundle
        run: |
          mkdir -p /tmp/ref
          emacs -Q --batch -l elisp/build-app-bundle.el -- \
            elisp/test/fixtures/pantry.org /tmp/ref
      - name: Build + test (byte-equivalence against the reference)
        run: ./gradlew build -PelispBundle=/tmp/ref/jetpacs-app-pantry.el --console=plain
