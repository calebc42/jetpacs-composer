name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  elisp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Emacs
        run: sudo apt-get update && sudo apt-get install -y emacs-nox
      - name: Run the runtime suite + bundle smoke
        run: sh elisp/test/run-tests.sh
